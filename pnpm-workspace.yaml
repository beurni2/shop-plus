packages:
  - "apps/*"
  - "services/*"
  - "packages/*"

# pnpm 10 blocks dependency build scripts by default; the prepare builds
# need this allowlist or the packages install without dist/ (CONSUMING.md).
onlyBuiltDependencies:
  - "@platform/contracts"
  - "@platform/kernel-types"
  - "@platform/i18n"
  - "@platform/ui-tokens"
  - "@platform/certification"
  # workerd: the real Workers runtime used by the commerce-core reservation-DO
  # adversarial tests (WO-1.1); its postinstall places the binary.
  - "workerd"

# @platform/contracts depends on @platform/kernel-types@0.4.0, and
# @platform/certification (WO-2.5: §3 re-certification of the grown payment
# mock) depends on @platform/contracts@0.5.0 + @platform/ui-tokens@0.5.0 —
# none exist on any registry; the overrides route every transitive
# resolution to the same pinned git ref (CONSUMING.md). Pin = sha 0ff6696a
# (canon v0.5.0; founder ruling: tags are unreliable, the release ref is
# the commit).
overrides:
  "@platform/kernel-types": "git+https://github.com/beurni2/platform-contracts.git#2472e7ae61a2ded70f4b4e8caad3b8fcb2d5df55&path:packages/kernel-types"
  "@platform/contracts": "git+https://github.com/beurni2/platform-contracts.git#2472e7ae61a2ded70f4b4e8caad3b8fcb2d5df55&path:packages/contracts"
  # @platform/ui-tokens is SKEWED PER APP (WO-5.3, founder ruling — a NAMED,
  # time-boxed debt). v0.6.0→v0.8.0 was a full token-system replacement (Grand
  # Teint, WO-5.0), NOT a rename: reseller-app's whole token vocabulary
  # (surface/inkMuted/line/displayFcfa/theme.spacing…) has no mechanical v0.8.0
  # mapping. So the DEFAULT ui-tokens stays v0.6.0 (539dbc8a) — reseller-app +
  # commerce-core + the @platform/certification transitive keep the API they
  # consume, untouched — and ONLY buyer-pwa takes v0.8.0 (Grand Teint) via the
  # scoped override below (most-specific wins). Tokens are plain DATA; two
  # instances are harmless (proven at install). The skew DIES at reseller-app's
  # Grand Teint slice (its S1–S8 screens).
  "@platform/ui-tokens": "git+https://github.com/beurni2/platform-contracts.git#539dbc8ac8372d0d98606428258f79ad0f1ceaaa&path:packages/ui-tokens"
  "@shop-plus/buyer-pwa>@platform/ui-tokens": "git+https://github.com/beurni2/platform-contracts.git#2472e7ae61a2ded70f4b4e8caad3b8fcb2d5df55&path:packages/ui-tokens"
