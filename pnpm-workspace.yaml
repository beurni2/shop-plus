packages:
  - "apps/*"
  - "services/*"
  - "packages/*"

# pnpm 10 blocks dependency build scripts by default; the prepare builds
# need this allowlist or the packages install without dist/ (CONSUMING.md).
onlyBuiltDependencies:
  - "@platform/contracts"
  - "@platform/kernel-types"
  - "@platform/i18n"
  - "@platform/ui-tokens"
  - "@platform/certification"
  # workerd: the real Workers runtime used by the commerce-core reservation-DO
  # adversarial tests (WO-1.1); its postinstall places the binary.
  - "workerd"

# @platform/contracts depends on @platform/kernel-types@0.4.0, and
# @platform/certification (WO-2.5: §3 re-certification of the grown payment
# mock) depends on @platform/contracts@0.5.0 + @platform/ui-tokens@0.5.0 —
# none exist on any registry; the overrides route every transitive
# resolution to the same pinned git ref (CONSUMING.md). Pin = sha 0ff6696a
# (canon v0.5.0; founder ruling: tags are unreliable, the release ref is
# the commit).
overrides:
  "@platform/kernel-types": "git+https://github.com/beurni2/platform-contracts.git#a832df0a8ed9e9fc83083826bc11c2a2e57e615a&path:packages/kernel-types"
  "@platform/contracts": "git+https://github.com/beurni2/platform-contracts.git#a832df0a8ed9e9fc83083826bc11c2a2e57e615a&path:packages/contracts"
  # @platform/ui-tokens is UNIFIED at canon v0.9.9 (1c98ad1, + Storefront aggregate fields WO-5.13) — WO-7.0/WO-7.2b/SP#001-A
  # killed the WO-5.3 per-app skew and re-pinned the whole workspace to the current
  # release in one bump. reseller-app runs its visual layer on the Grand Teint API
  # (theme.colours, top-level type/spacing/radius/touch/interaction, the nav glyphs
  # + dimension.iconSizePx.tab). ONE default instance for buyer-pwa + reseller-app
  # + the @platform/certification transitive — no scoped exception. The former
  # `@platform/certification>@platform/ui-tokens` v0.6.0 override is DELETED: the
  # neutralColors→sharedColour rename landed at v0.8.0, so the report-html bug
  # existed only in the ancient v0.6.0 snapshot; certification at v0.9.9 resolves
  # sharedColour and needs no override (CTO ruling, WO-7.0 re-pin).
  "@platform/ui-tokens": "git+https://github.com/beurni2/platform-contracts.git#a832df0a8ed9e9fc83083826bc11c2a2e57e615a&path:packages/ui-tokens"
