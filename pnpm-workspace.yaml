packages:
  - "apps/*"
  - "services/*"
  - "packages/*"

# pnpm 10 blocks dependency build scripts by default; the prepare builds
# need this allowlist or the packages install without dist/ (CONSUMING.md).
onlyBuiltDependencies:
  - "@platform/contracts"
  - "@platform/kernel-types"
  - "@platform/i18n"
  - "@platform/ui-tokens"
  # workerd: the real Workers runtime used by the commerce-core reservation-DO
  # adversarial tests (WO-1.1); its postinstall places the binary.
  - "workerd"

# @platform/contracts depends on @platform/kernel-types@0.4.0, which exists
# on no registry; this override routes that transitive resolution to the
# same pinned git ref (CONSUMING.md). Pin = sha 0ff6696a (canon v0.5.0;
# founder ruling: tags are unreliable, the release ref is the commit).
overrides:
  "@platform/kernel-types": "git+https://github.com/beurni2/platform-contracts.git#0ff6696a4d0d89bef24822711e452c9a0ff07f9f&path:packages/kernel-types"
