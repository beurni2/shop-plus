<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Shop+</title>
    <script>
      // WO-7.1 — SPA-fallback RESTORE (rafgraph/spa-github-pages). When the
      // 404.html redirected a /v/{slug} deep link to `…/?/v/{slug}`, decode it
      // back to the real path so the app reads location.pathname (the canon
      // /v/{slug}) — never a query-string link. No-op on normal loads.
      (function (l) {
        if (l.search[1] === '/') {
          // BUG 2 fix — PIN the document base to the app root BEFORE rewriting the
          // URL. The restore replaceState moves location to the deep /v/{slug}
          // path; with vite's relative base ('./') that would re-root the module
          // script + assets at `<deep>/assets/*` and 404 them, so the app never
          // boots on the real Pages deploy (beurni2.github.io/shop-plus/). Here
          // l.pathname is the project root (e.g. /shop-plus/); a <base> element
          // pins baseURI to it, so './assets/*' always resolve to the app root
          // regardless of the restored path. No-op on normal loads (no `?/`).
          var b = document.createElement('base');
          b.href = l.pathname;
          document.head.insertBefore(b, document.head.firstChild);
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
